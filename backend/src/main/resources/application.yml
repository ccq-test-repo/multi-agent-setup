server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:pathiful}
    username: ${DB_USER:pathiful}
    password: ${DB_PASSWORD:pathiful}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

openrouteservice:
  api-key: ${OPENROUTESERVICE_API_KEY:}
  base-url: ${OPENROUTESERVICE_BASE_URL:https://api.openrouteservice.org/v2}

open-meteo:
  base-url: ${OPEN_METEO_BASE_URL:https://api.open-meteo.com/v1}

weather:
  cache:
    minutes: ${WEATHER_CACHE_MINUTES:30}

logging:
  level:
    root: ${LOG_LEVEL:INFO}
    com.pathiful: ${APP_LOG_LEVEL:DEBUG}
